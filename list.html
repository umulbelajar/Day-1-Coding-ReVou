<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-glass-bg: rgba(255, 255, 255, 0.15);
            --color-glass-border: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-600 via-purple-500 to-pink-500 flex items-center justify-center p-8 font-sans">

    <div class="w-full max-w-2xl flex flex-col gap-6">

        <!-- Page Title -->
        <div class="text-center mb-2">
            <h1 class="text-4xl font-bold text-white drop-shadow-lg tracking-wide">My Lists</h1>
            <p class="text-white/70 mt-1 text-sm">Styled with Tailwind CSS v4 + Glassmorphism</p>
        </div>

        <!-- Card 1: Buah-buahan -->
        <div class="rounded-2xl border border-white/30 bg-white/15 backdrop-blur-md shadow-xl p-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">🍉</span>
                <h2 class="text-xl font-semibold text-white">Daftar Buah-buahan</h2>
            </div>
            <ul class="space-y-2">
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="w-2 h-2 rounded-sm bg-yellow-300 inline-block"></span>
                    Mangga
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-yellow-300 inline-block"></span>
                    Pisang
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-yellow-300 inline-block"></span>
                    Alpukat
                </li>
            </ul>
        </div>

        <!-- Card 2: Tutorial Coding -->
        <div class="rounded-2xl border border-white/30 bg-white/15 backdrop-blur-md shadow-xl p-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">💻</span>
                <h2 class="text-xl font-semibold text-white">Tutorial Coding dengan Kiro</h2>
            </div>
            <ol class="space-y-2">
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white/30 text-white text-xs font-bold flex items-center justify-center">a</span>
                    Buka Github.com
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white/30 text-white text-xs font-bold flex items-center justify-center">b</span>
                    Pilih New Repository
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white/30 text-white text-xs font-bold flex items-center justify-center">c</span>
                    Isi nama repository
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white/30 text-white text-xs font-bold flex items-center justify-center">d</span>
                    Hidupkan Add Readme
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-2.5 text-white/90 hover:bg-white/20 transition-colors">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white/30 text-white text-xs font-bold flex items-center justify-center">e</span>
                    Klik Create Repository
                </li>
            </ol>
        </div>

    </div>

</body>
</html>
